name: Release – Package & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+.[0-9]+'   # e.g. v2026.03.21.1 (override)
  workflow_dispatch:
    inputs:
      create_github_release:
        description: 'Create a GitHub Release?'
        required: false
        default: 'true'
        type: boolean

jobs:
  build-and-publish:
    name: Build, Sign & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for creating GitHub Releases

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for version tagging

      # ── 2. Java toolchain ─────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Gradle cache ───────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 4. Determine version ──────────────────────────────────────────────
      # Version format: YYYY.MM.DD.N  (N = daily build number, starting at 1)
      # versionCode:    YYYYMMDD * 100 + N  (stays within Android Int limit through 2099)
      - name: Auto-generate version name
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag-based override: strip leading 'v'
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Auto-generate: YYYY.MM.DD.N
            DATE=$(date -u +%Y.%m.%d)
            DATE_COMPACT=$(date -u +%Y%m%d)

            # Count existing releases for today to get the next daily increment
            EXISTING=$(gh release list \
              --repo "$GITHUB_REPOSITORY" \
              --limit 100 \
              --json tagName \
              --jq "[.[].tagName | select(startswith(\"v${DATE}\"))] | length" \
              2>/dev/null || echo "0")
            # Sanitise: ensure it is a plain integer
            EXISTING=$(echo "$EXISTING" | tr -cd '0-9')
            DAILY_NUM=$(( ${EXISTING:-0} + 1 ))

            VERSION="${DATE}.${DAILY_NUM}"
          fi

          # Parse components for versionCode
          # VERSION is e.g. 2026.03.21.1
          DATE_COMPACT=$(echo "$VERSION" | sed 's/\.\([0-9]*\)$//; s/\.//g')
          DAILY_NUM=$(echo "$VERSION" | grep -oE '[0-9]+$')
          VERSION_CODE=$(( DATE_COMPACT * 100 + DAILY_NUM ))

          echo "name=${VERSION}"        >> "$GITHUB_OUTPUT"
          echo "code=${VERSION_CODE}"   >> "$GITHUB_OUTPUT"
          echo "Generated version: ${VERSION} (code: ${VERSION_CODE})"

      # ── 5. Unit tests ─────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'

      # ── 6. Check signing configuration ────────────────────────────────────
      # secrets context is not available in `if:` expressions, so we detect
      # keystore presence here and expose it as a step output instead.
      - name: Check signing configuration
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No RELEASE_KEYSTORE_BASE64 secret found – building unsigned APK/AAB."
          fi

      # ── 7. Decode keystore ────────────────────────────────────────────────
      - name: Decode release keystore
        if: steps.signing.outputs.has_keystore == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      # ── 8. Build release APK ──────────────────────────────────────────────
      - name: Build release APK (unsigned – no keystore)
        if: steps.signing.outputs.has_keystore == 'false'
        run: |
          ./gradlew :app:assembleRelease \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}" \
            --no-daemon

      - name: Build release APK (signed)
        if: steps.signing.outputs.has_keystore == 'true'
        run: |
          ./gradlew :app:assembleRelease \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}" \
            -PstoreFile="$RUNNER_TEMP/release.keystore" \
            -PstorePassword="${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.RELEASE_KEY_PASSWORD }}" \
            --no-daemon

      # ── 9. Build release AAB ──────────────────────────────────────────────
      - name: Build release AAB (unsigned – no keystore)
        if: steps.signing.outputs.has_keystore == 'false'
        run: |
          ./gradlew :app:bundleRelease \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}" \
            --no-daemon

      - name: Build release AAB (signed)
        if: steps.signing.outputs.has_keystore == 'true'
        run: |
          ./gradlew :app:bundleRelease \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}" \
            -PstoreFile="$RUNNER_TEMP/release.keystore" \
            -PstorePassword="${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.RELEASE_KEY_PASSWORD }}" \
            --no-daemon

      # ── 9. Locate artefacts ───────────────────────────────────────────────
      - name: Locate build artefacts
        id: artefacts
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          echo "apk=${APK}" >> "$GITHUB_OUTPUT"
          echo "aab=${AAB}" >> "$GITHUB_OUTPUT"
          echo "Found APK: ${APK}"
          echo "Found AAB: ${AAB}"

      # ── 10. Rename artefacts with version ─────────────────────────────────
      - name: Rename artefacts
        id: rename
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          APK="${{ steps.artefacts.outputs.apk }}"
          AAB="${{ steps.artefacts.outputs.aab }}"
          DIR=$(dirname "$APK")
          DIR_AAB=$(dirname "$AAB")
          cp "$APK" "${DIR}/NetSwissKnife-${VERSION}.apk"
          cp "$AAB" "${DIR_AAB}/NetSwissKnife-${VERSION}.aab"
          echo "apk_named=${DIR}/NetSwissKnife-${VERSION}.apk"    >> "$GITHUB_OUTPUT"
          echo "aab_named=${DIR_AAB}/NetSwissKnife-${VERSION}.aab" >> "$GITHUB_OUTPUT"

      # ── 11. Upload artefacts to workflow run ──────────────────────────────
      - name: Upload APK artefact
        uses: actions/upload-artifact@v4
        with:
          name: NetSwissKnife-${{ steps.version.outputs.name }}-apk
          path: ${{ steps.rename.outputs.apk_named }}
          if-no-files-found: error

      - name: Upload AAB artefact
        uses: actions/upload-artifact@v4
        with:
          name: NetSwissKnife-${{ steps.version.outputs.name }}-aab
          path: ${{ steps.rename.outputs.aab_named }}
          if-no-files-found: error

      # ── 12. Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        if: >
          github.event_name == 'push' ||
          github.event.inputs.create_github_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', steps.version.outputs.name) }}
          name: "Net Swiss Knife ${{ steps.version.outputs.name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.rename.outputs.apk_named }}
            ${{ steps.rename.outputs.aab_named }}
          body: |
            ## Net Swiss Knife ${{ steps.version.outputs.name }}

            ### Installation

            **Direct install (sideload)**
            1. Download `NetSwissKnife-${{ steps.version.outputs.name }}.apk`
            2. Enable *Install from unknown sources* in Android settings
            3. Open the APK to install

            **Play Store (AAB)**
            The `.aab` bundle is intended for Google Play internal testing / production upload.

            ### Requirements
            - Android 8.0 (API 26) or higher

            ### Build info
            - Version code: `${{ steps.version.outputs.code }}`
            - Commit: `${{ github.sha }}`
            - Signed: ${{ steps.signing.outputs.has_keystore == 'true' && 'Yes (release key)' || 'Debug key (sideload only – not for Play Store)' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
