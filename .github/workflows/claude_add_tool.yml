name: Claude – Add Tool

on:
  workflow_dispatch:
    inputs:
      tool_prompt:
        description: 'Describe the networking tool to add (e.g. "WHOIS lookup tool")'
        required: true
        type: string

jobs:
  add-tool:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute branch name
        id: branch
        run: |
          BRANCH_NAME="tool-$(date -u +"%Y%m%d-%H%M%S")"
          echo "name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Delete remote branch if it already exists
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          if git ls-remote --heads origin "${BRANCH}" | grep -q "${BRANCH}"; then
            git push origin --delete "${BRANCH}"
          fi

      - name: Create and switch to new branch
        run: |
          git checkout -b "${{ steps.branch.outputs.name }}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Invoke Claude Code to implement the tool
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Follow the instructions in claude/tool_instructions.md exactly.
            Use the following description to define the new tool:

            ${{ github.event.inputs.tool_prompt }}

            Remember to:
            1. Add failing unit tests first (TDD red phase).
            2. Implement just enough to make tests pass (green phase).
            3. Refactor while keeping tests green.
            4. Update README.md and claude/tool_instructions.md with a short description of the new tool.
            5. Ensure ./gradlew test and ./gradlew :app:assembleDebug succeed.

      - name: Run unit tests
        run: ./gradlew test

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git add -A
            git commit -m "feat: add tool – ${{ github.event.inputs.tool_prompt }}"
          else
            echo "No changes to commit"
          fi

      - name: Push branch
        run: |
          git push -u origin "${{ steps.branch.outputs.name }}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --title "Add tool: ${{ github.event.inputs.tool_prompt }}" \
            --body "## New Tool

          **Tool description:** ${{ github.event.inputs.tool_prompt }}

          ## What changed
          This PR was automatically generated by the Claude Code GitHub Action.
          Claude followed \`claude/tool_instructions.md\` to implement a new networking tool using TDD:

          1. Added failing unit tests.
          2. Implemented the tool in \`:core-network\` and \`:core-domain\`.
          3. Added a ViewModel and Compose screen in \`:app\`.
          4. Wired the screen into Navigation and the bottom bar.

          ## Checklist
          - [ ] Tests pass (\`./gradlew test\`)
          - [ ] Debug build succeeds (\`./gradlew :app:assembleDebug\`)
          - [ ] Code reviewed for correctness and style"
